<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CaféExpress | Acceso</title>
    <link rel="stylesheet" href="css/branding.css">
</head>
<body class="premium-login-body">

    <div class="premium-login-card">
        <h1 class="brand-logo">CaféExpress</h1>
        <span class="login-subtitle">Experiencia Gourmet</span>

        <form>
            <div class="premium-input-group">
                <input type="text" class="premium-input" placeholder="Usuario" required>
            </div>
            <div class="premium-input-group">
                <input type="password" class="premium-input" placeholder="Contraseña" required>
            </div>
            <button type="submit" class="premium-btn">Entrar</button>
        </form>
    </div>

</body>
</html>
